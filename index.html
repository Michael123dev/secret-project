<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lala, It's For You 💕</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ffc0cb, #ffe4e1);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      max-width: 350px;
      position: relative;
    }

    h1 {
      color: #ff4d6d;
      min-height: 60px;
    }

    .buttons {
      margin-top: 20px;
      position: relative;
      height: 100px;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 20px;
      font-size: 16px;
      cursor: pointer;
      position: absolute;
      transition: 0.2s;
    }

    #yesBtn {
      background: #ff4d6d;
      color: white;
      left: 40px;
    }

    #noBtn {
      background: #ccc;
      color: black;
      right: 40px;
    }

    #yesBtn:hover {
      background: #ff1e4d;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
      color: #ff4d6d;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="question">Do you love me? 😏💕</h1>

    <div class="buttons">
      <button id="yesBtn" onclick="sayYes()">Yes ❤️</button>
      <button id="noBtn">No 😢</button>
    </div>

    <div id="result" class="result">I knew it 😘💖</div>
  </div>

  <script>
    const noBtn = document.getElementById('noBtn');
    const question = document.getElementById('question');

    let noCount = 0;

    const noMessages = [
      "You lied 😳",
      "Seriously? 😐",
      "Are you kidding? 😭"
    ];

    noBtn.addEventListener('mouseover', () => {
      const x = Math.random() * (window.innerWidth - 100);
      const y = Math.random() * (window.innerHeight - 50);

      noBtn.style.position = 'fixed';
      noBtn.style.left = x + 'px';
      noBtn.style.top = y + 'px';

      if (noCount < noMessages.length) {
        question.innerText = noMessages[noCount];
        noCount++;
      } else {
        question.innerText = "Just press YES already 😏❤️";
      }
    });

    function sayYes() {
      document.getElementById('result').style.display = 'block';
    }
  </script>
</body>
</html>
